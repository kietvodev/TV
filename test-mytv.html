<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTV Test – Xem Trực Tiếp</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/shaka-player.compiled.js" defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;
  --surface:#1a1a22;
  --surface2:#22222e;
  --accent:#00c2ff;
  --accent2:#0088bb;
  --text:#eaeaf2;
  --muted:#8888aa;
  --radius:10px;
  --active-ch:#00c2ff22;
  --active-border:#00c2ff;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
/* HEADER */
.header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-bottom:1px solid #2a2a38;flex-shrink:0}
.header-logo{font-size:1.2rem;font-weight:700;color:var(--accent);letter-spacing:.5px;white-space:nowrap}
.header-logo span{color:#fff}
.search-box{flex:1;max-width:360px;position:relative}
.search-box input{width:100%;background:var(--surface2);border:1px solid #333344;border-radius:6px;padding:7px 12px 7px 34px;color:var(--text);font-size:.9rem;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.85rem;pointer-events:none}
.header-info{margin-left:auto;font-size:.8rem;color:var(--muted)}
/* MAIN LAYOUT */
.main{display:flex;flex:1;min-height:0;overflow:hidden}
/* SIDEBAR */
.sidebar{width:320px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid #2a2a38;background:var(--surface)}
.group-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px;background:var(--surface2);border-bottom:1px solid #2a2a38;flex-shrink:0}
.group-tab{padding:4px 10px;border-radius:14px;border:1px solid #333344;font-size:.78rem;cursor:pointer;color:var(--muted);background:transparent;transition:all .15s;white-space:nowrap}
.group-tab:hover{border-color:var(--accent);color:var(--accent)}
.group-tab.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.ch-list{flex:1;overflow-y:auto;padding:6px 0}
.ch-list::-webkit-scrollbar{width:4px}
.ch-list::-webkit-scrollbar-track{background:transparent}
.ch-list::-webkit-scrollbar-thumb{background:#333344;border-radius:2px}
.ch-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;border-radius:6px;margin:1px 6px;transition:all .12s;border:1px solid transparent}
.ch-item:hover{background:var(--surface2)}
.ch-item.active{background:var(--active-ch);border-color:var(--active-border)}
.ch-logo{width:42px;height:28px;object-fit:contain;border-radius:3px;background:#1a1a22;flex-shrink:0}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-group{font-size:.72rem;color:var(--muted)}
.ch-badge{font-size:.65rem;padding:1px 5px;border-radius:8px;background:#cc333333;color:#ff7777;border:1px solid #cc3333}
/* PLAYER AREA */
.player-area{flex:1;display:flex;flex-direction:column;min-width:0;background:#000}
.player-wrap{position:relative;width:100%;flex:1;min-height:0;background:#000}
video{width:100%;height:100%;display:block;object-fit:contain;background:#000}
/* OVERLAY */
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000000cc;z-index:10;gap:14px}
.overlay.hidden{display:none}
.spinner{width:44px;height:44px;border:3px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay-logo{width:72px;height:48px;object-fit:contain;border-radius:6px}
.overlay-text{color:var(--text);font-size:.9rem;text-align:center;max-width:300px}
.overlay-sub{color:var(--muted);font-size:.78rem;text-align:center}
/* PLAYER BOTTOM BAR */
.player-bar{background:var(--surface);border-top:1px solid #2a2a38;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.now-playing-logo{width:36px;height:24px;object-fit:contain;border-radius:3px;background:var(--surface2)}
.now-playing-name{font-size:.9rem;font-weight:600}
.now-playing-status{font-size:.78rem;color:var(--muted);margin-left:auto}
.badge-hls{background:#00aa5533;color:#00cc66;border:1px solid #00aa55;padding:1px 6px;border-radius:8px;font-size:.7rem}
.badge-dash{background:#aa550033;color:#ff9900;border:1px solid #aa5500;padding:1px 6px;border-radius:8px;font-size:.7rem}
.badge-loading{background:#555;color:#bbb;border:1px solid #666;padding:1px 6px;border-radius:8px;font-size:.7rem}
/* WELCOME SCREEN */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted)}
.welcome-icon{font-size:4rem;opacity:.3}
.welcome-text{font-size:1.1rem;opacity:.5}
.welcome-sub{font-size:.85rem;opacity:.4;text-align:center;max-width:260px;line-height:1.6}
/* TOAST */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:#222234;color:#eaeaf2;border:1px solid #333;padding:8px 18px;border-radius:8px;font-size:.85rem;opacity:0;transition:all .3s;z-index:100;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* RESPONSIVE MOBILE */
@media(max-width:700px){
  .main{flex-direction:column}
  .sidebar{width:100%;height:240px;border-right:none;border-bottom:1px solid #2a2a38}
  .group-tabs{overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none}
  .group-tabs::-webkit-scrollbar{display:none}
  .player-area{flex:1;min-height:0}
}
/* QUALITY BADGE (DRM warning) */
.drm-lock{font-size:.75rem;margin-left:4px;opacity:.6}
/* NO RESULTS */
.no-results{padding:30px;text-align:center;color:var(--muted);font-size:.85rem}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">My<span>TV</span> Test</div>
  <div class="search-box">
    <input type="search" id="search-input" placeholder="Tìm kênh..." autocomplete="off">
  </div>
  <div class="header-info" id="header-info">Proxy: localhost:3001</div>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="group-tabs" id="group-tabs">
      <button class="group-tab active" data-group="all">Tất cả</button>
    </div>
    <div class="ch-list" id="ch-list">
      <div class="no-results">Đang tải danh sách kênh...</div>
    </div>
  </div>

  <!-- PLAYER AREA -->
  <div class="player-area">
    <div class="player-wrap" id="player-wrap">
      <!-- Welcome screen -->
      <div class="welcome" id="welcome-screen">
        <div class="welcome-icon">📺</div>
        <div class="welcome-text">Chọn kênh để xem</div>
        <div class="welcome-sub">Nhấp vào bất kỳ kênh nào bên trái để bắt đầu xem ngay lập tức</div>
      </div>
      <!-- Video -->
      <video id="video" autoplay playsinline muted style="display:none"></video>
      <!-- Overlay (loading / error) -->
      <div class="overlay hidden" id="overlay">
        <img class="overlay-logo" id="overlay-logo" src="" alt="" style="display:none">
        <div class="spinner" id="overlay-spinner"></div>
        <div class="overlay-text" id="overlay-text">Đang kết nối...</div>
        <div class="overlay-sub" id="overlay-sub"></div>
      </div>
    </div>
    <div class="player-bar" id="player-bar" style="display:none">
      <img class="now-playing-logo" id="bar-logo" src="" alt="">
      <div class="now-playing-name" id="bar-name">-</div>
      <div class="now-playing-status" id="bar-status">
        <span class="badge-loading" id="bar-badge">⌛ Chờ</span>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

// ============================================================
// STATE
// ============================================================
let currentCh = null;
let hlsPlayer = null;
let shakaPlayer = null;
let hbTimer = null;
let pollTimer = null;
let pollCount = 0;
let activeGroup = 'all';
let searchQuery = '';

// ============================================================
// UTILS
// ============================================================
const $ = id => document.getElementById(id);
const toast = (msg, dur=3000) => {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), dur);
};

// ============================================================
// RENDER CHANNELS
// ============================================================
function getFilteredChannels() {
  return CHANNELS.filter(ch => {
    const matchGroup = activeGroup === 'all' || ch.group === activeGroup;
    const matchSearch = !searchQuery || ch.name.toLowerCase().includes(searchQuery);
    return matchGroup && matchSearch;
  });
}

function renderGroups() {
  const groups = ['all', ...new Set(CHANNELS.map(c => c.group))];
  const tabOrder = ['all','VTV','HTV','SCTV','VTVCab','Thể thao','Quốc tế','Địa phương','Mua sắm'];
  const sorted = tabOrder.filter(g => groups.includes(g));
  const labels = { all: 'Tất cả', VTV: 'VTV', HTV: 'HTV', SCTV: 'SCTV', VTVCab: 'VTVCab',
    'Thể thao': '⚽ Thể thao', 'Quốc tế': '🌍 Quốc tế', 'Địa phương': '📍 Địa phương', 'Mua sắm': '🛍️ Mua sắm' };
  const container = $('group-tabs');
  container.innerHTML = sorted.map(g =>
    `<button class="group-tab${g === activeGroup ? ' active' : ''}" data-group="${g}">${labels[g] || g}</button>`
  ).join('');
  container.querySelectorAll('.group-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeGroup = btn.dataset.group;
      renderGroups();
      renderChannels();
    });
  });
}

function renderChannels() {
  const list = getFilteredChannels();
  const container = $('ch-list');
  if (!list.length) {
    container.innerHTML = '<div class="no-results">Không tìm thấy kênh</div>';
    return;
  }
  container.innerHTML = list.map(ch => `
    <div class="ch-item${currentCh && currentCh.id === ch.id ? ' active' : ''}" data-id="${ch.id}">
      <img class="ch-logo" src="${ch.logo}" alt="${ch.name}" loading="lazy"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 28%22><rect width=%2240%22 height=%2228%22 fill=%22%23222%22/><text x=%2250%%22 y=%2258%%22 fill=%22%23555%22 font-size=%2210%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22>📺</text></svg>'">
      <div class="ch-info">
        <div class="ch-name">${ch.name}${ch.drm ? ' <span class="drm-lock" title="DRM – cần DASH player">🔒</span>' : ''}</div>
        <div class="ch-group">${ch.group}${ch._inProxy ? ' <span style="color:#00cc66;font-size:.68rem">●</span>' : ''}</div>
      </div>
    </div>
  `).join('');
  container.querySelectorAll('.ch-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = parseInt(el.dataset.id);
      const ch = CHANNELS.find(c => c.id === id);
      if (ch) playChannel(ch);
    });
  });
}

// ============================================================
// OVERLAY HELPERS
// ============================================================
function showOverlay(text, sub, logo) {
  const ov = $('overlay');
  ov.classList.remove('hidden');
  $('overlay-text').textContent = text;
  $('overlay-sub').textContent = sub || '';
  $('overlay-spinner').style.display = '';
  if (logo) {
    $('overlay-logo').src = logo;
    $('overlay-logo').style.display = '';
  } else {
    $('overlay-logo').style.display = 'none';
  }
}

function hideOverlay() {
  $('overlay').classList.add('hidden');
}

function showError(msg) {
  const ov = $('overlay');
  ov.classList.remove('hidden');
  $('overlay-spinner').style.display = 'none';
  $('overlay-text').textContent = msg;
  $('overlay-sub').textContent = 'Nhấp vào kênh khác hoặc thử lại';
  if (currentCh) $('overlay-logo').style.display = 'none';
}

function setBarBadge(type) {
  const el = $('bar-badge');
  if (type === 'hls') { el.className = 'badge-hls'; el.textContent = '▶ HLS'; }
  else if (type === 'dash') { el.className = 'badge-dash'; el.textContent = '▶ DASH'; }
  else if (type === 'loading') { el.className = 'badge-loading'; el.textContent = '⌛ Chờ...'; }
  else if (type === 'error') { el.className = 'badge-loading'; el.textContent = '✗ Lỗi'; }
}

// ============================================================
// PLAYER CLEANUP
// ============================================================
function stopAll() {
  clearInterval(hbTimer);
  clearTimeout(pollTimer);
  hbTimer = null; pollTimer = null; pollCount = 0;

  if (hlsPlayer) {
    try { hlsPlayer.destroy(); } catch(e) {}
    hlsPlayer = null;
  }
  if (shakaPlayer) {
    try { shakaPlayer.destroy(); } catch(e) {}
    shakaPlayer = null;
  }
  const vid = $('video');
  vid.src = '';
  vid.pause();
}

// ============================================================
// HEARTBEAT
// ============================================================
function startHeartbeat(channelId) {
  clearInterval(hbTimer);
  const beat = () => fetch(`${PROXY}/heartbeat/${channelId}`, { mode: 'no-cors' }).catch(() => {});
  beat();
  hbTimer = setInterval(beat, HB_INTERVAL);
}

// ============================================================
// HLS PLAYER
// ============================================================
function startHls(url, ch) {
  const vid = $('video');
  vid.style.display = '';
  $('welcome-screen').style.display = 'none';
  stopAll(); // gọi sau khi hide welcome, trước khi tạo mới

  showOverlay('Đang tải stream HLS...', '', ch.logo);
  setBarBadge('loading');

  const hls = new Hls({
    enableWorker: false,
    maxBufferLength: 12,
    maxMaxBufferLength: 30,
    liveSyncDurationCount: 2,
    liveMaxLatencyDurationCount: 4,
    fragLoadingTimeOut: 20000,
    manifestLoadingTimeOut: 10000,
  });
  hlsPlayer = hls;
  hls.attachMedia(vid);
  hls.on(Hls.Events.MEDIA_ATTACHED, () => hls.loadSource(url));
  hls.on(Hls.Events.MANIFEST_PARSED, () => {
    vid.muted = true;
    vid.play().then(() => { vid.muted = false; }).catch(() => {});
  });
  hls.on(Hls.Events.FRAG_LOADED, () => {
    hideOverlay();
    setBarBadge('hls');
  });
  hls.on(Hls.Events.ERROR, (e, data) => {
    if (data.fatal) {
      if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
        hls.startLoad();
      } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
        hls.recoverMediaError();
      } else {
        showError('Stream lỗi – không thể phát');
        setBarBadge('error');
      }
    }
  });
  vid.addEventListener('playing', () => { hideOverlay(); setBarBadge('hls'); }, { once: false });

  startHeartbeat('mytv_' + ch.id);
}

// ============================================================
// SHAKA PLAYER (DASH)
// ============================================================
async function startDash(url, ch) {
  const vid = $('video');
  vid.style.display = '';
  $('welcome-screen').style.display = 'none';

  showOverlay('Đang tải stream DASH...', '', ch.logo);
  setBarBadge('loading');

  if (typeof shaka === 'undefined') {
    showError('Shaka Player chưa tải – thử lại sau 2s');
    setTimeout(() => startDash(url, ch), 2000);
    return;
  }
  shaka.polyfill.installAll();
  if (!shaka.Player.isBrowserSupported()) {
    showError('Trình duyệt không hỗ trợ DASH/DRM');
    setBarBadge('error');
    return;
  }

  try {
    const player = new shaka.Player(vid);
    shakaPlayer = player;

    player.configure({
      streaming: { bufferingGoal: 12, rebufferingGoal: 2, retryParameters: { maxAttempts: 3 } }
    });

    const licUrl = `${PROXY}/license/mytv_${ch.id}`;
    player.configure('drm.servers', {
      'com.widevine.alpha': licUrl,
      'com.microsoft.playready': licUrl + '?type=playready',
    });

    player.addEventListener('error', evt => {
      console.error('[Shaka] error', evt.detail);
      showError('DASH lỗi: ' + (evt.detail?.message || 'không rõ'));
      setBarBadge('error');
    });

    await player.load(url);
    vid.muted = true;
    await vid.play().catch(() => {});
    vid.muted = false;
    hideOverlay();
    setBarBadge('dash');
    startHeartbeat('mytv_' + ch.id);
  } catch(e) {
    console.error('[Shaka]', e);
    showError('Không thể phát DASH: ' + (e.message || e));
    setBarBadge('error');
  }
}

// ============================================================
// PLAY CHANNEL – MAIN ENTRY
// ============================================================
async function playChannel(ch) {
  if (currentCh && currentCh.id === ch.id) return;

  stopAll();
  currentCh = ch;

  // Update UI
  const welcome = $('welcome-screen');
  const vid = $('video');
  welcome.style.display = 'none';
  vid.style.display = '';

  const bar = $('player-bar');
  bar.style.display = 'flex';
  $('bar-logo').src = ch.logo;
  $('bar-name').textContent = ch.name;
  setBarBadge('loading');

  // Highlight active channel in list
  document.querySelectorAll('.ch-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === ch.id);
  });

  showOverlay('Đang kết nối...', 'Đang mở kênh ' + ch.name, ch.logo);

  // Trigger startLoop on proxy.js – calling /live/mytv_{id}.m3u8 triggers
  // startLoop() directly regardless of whether channel is in channelInfo.
  // Returns 503 initially (Puppeteer hasn't loaded yet), but that's OK.
  fetch(`${PROXY}/live/mytv_${ch.id}.m3u8`).catch(() => {});

  // Poll for stream type (hls / dash / pending)
  pollCount = 0;
  pollForType(ch);
}

function pollForType(ch) {
  if (!currentCh || currentCh.id !== ch.id) return; // user changed channel

  fetch(`${PROXY}/api/type/${ch.id}`)
    .then(r => r.json())
    .then(data => {
      if (!currentCh || currentCh.id !== ch.id) return;

      if (data.type === 'hls') {
        const url = `${PROXY}/live/mytv_${ch.id}.m3u8`;
        startHls(url, ch);
      } else if (data.type === 'dash') {
        const url = `${PROXY}/live/mytv_${ch.id}.mpd`;
        startDash(url, ch);
      } else {
        // pending – keep triggering startLoop every few polls and retry
        pollCount++;
        // Re-trigger loop every 5 polls (3s) in case proxy missed the first call
        if (pollCount % 5 === 0) {
          fetch(`${PROXY}/live/mytv_${ch.id}.m3u8`).catch(() => {});
        }
        const elapsed = Math.round(pollCount * POLL_INTERVAL / 1000);
        showOverlay(
          'Đang mở kênh...',
          `Puppeteer đang mở tab (${elapsed}s) – chờ stream URL`,
          ch.logo
        );
        if (pollCount < MAX_POLL) {
          pollTimer = setTimeout(() => pollForType(ch), POLL_INTERVAL);
        } else {
          showError('Hết thời gian – proxy không phản hồi\nĐảm bảo proxy.js đang chạy (node proxy.js)');
          setBarBadge('error');
        }
      }
    })
    .catch(() => {
      if (!currentCh || currentCh.id !== ch.id) return;
      pollCount++;
      if (pollCount < 5) {
        pollTimer = setTimeout(() => pollForType(ch), 1000);
      } else {
        showError('Không kết nối được proxy\nĐảm bảo proxy.js đang chạy ở cổng 3001');
        setBarBadge('error');
      }
    });
}

// ============================================================
// SEARCH
// ============================================================
$('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderChannels();
});

// ============================================================
// PROXY STATUS
// ============================================================
async function checkProxy() {
  try {
    const r = await fetch(`${PROXY}/status`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      $('header-info').textContent = '✅ Proxy online :3001';
      $('header-info').style.color = '#00cc66';
    }
  } catch {
    $('header-info').textContent = '❌ Proxy offline :3001';
    $('header-info').style.color = '#ff5555';
  }
}

// ============================================================
// INIT
// ============================================================

// Try to enrich channel list with live channel info from proxy
async function enrichChannels() {
  try {
    const r = await fetch(`${PROXY}/api/channels/list`, { signal: AbortSignal.timeout(3000) });
    if (!r.ok) return;
    const list = await r.json();
    const mytvLive = list.filter(c => c.source === 'mytv' || (c.channelId && c.channelId.startsWith('mytv_')));
    // Mark channels that are configured in proxy (will stream faster)
    mytvLive.forEach(live => {
      const rawId = (live.channelId || '').replace('mytv_', '');
      const ch = CHANNELS.find(c => String(c.id) === rawId);
      if (ch) ch._inProxy = true;
    });
    renderChannels(); // re-render with proxy status
  } catch {}
}

renderGroups();
renderChannels();
checkProxy();
enrichChannels();
setInterval(checkProxy, 30000);
</script>
