        <script>
  function fetchWithTimeout(url, timeout = 2500) {
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error('Timeout')), timeout);

      fetch(url)
        .then(response => {
          clearTimeout(timer);
          resolve(response);
        })
        .catch(err => {
          clearTimeout(timer);
          reject(err);
        });
    });
  }

  window.addEventListener('DOMContentLoaded', () => {
    // Bỏ qua redirect khi chạy local
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:') {
      document.documentElement.style.visibility = 'visible';
      return;
    }
    // Thử lần 1 (timeout 5s), nếu thất bại thử lần 2 (timeout 5s), sau đó mới redirect
    fetchWithTimeout('https://server.xemtv.vn/fpt/proxy/xemtv/channels.php', 5000)
      .then(response => {
        if (!response.ok) throw new Error('Server error');
        document.documentElement.style.visibility = 'visible';
      })
      .catch(() => {
        return fetchWithTimeout('https://server.xemtv.vn/fpt/proxy/xemtv/channels.php', 5000)
          .then(response => {
            if (!response.ok) throw new Error('Server error');
            document.documentElement.style.visibility = 'visible';
          })
          .catch(() => {
            window.location.replace('/404.html');
          });
      });
  });
</script>
