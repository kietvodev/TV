<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy chủ đang bảo trì - XemTV.vn</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://xemtv.vn/Xemtvico.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #ff3d00;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 460px;
            width: 100%;
            padding: 32px 20px;
        }
        .logo-img {
            max-width: 140px;
            height: auto;
            margin-bottom: 28px;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .desc {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 24px;
        }
        .status-box {
            background: var(--card-bg);
            border-left: 3px solid var(--primary-color);
            border-radius: 8px;
            padding: 16px 18px;
            margin-bottom: 24px;
            text-align: left;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .status-box strong { color: var(--text-primary); }
        .status-offline { color: #f44336; }
        .status-checking { color: #ff9800; }
        .btn-check {
            display: inline-block;
            padding: 12px 32px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-check:hover { opacity: 0.85; }
        .btn-check:disabled { opacity: 0.4; cursor: not-allowed; }
        .auto-info {
            margin-top: 14px;
            font-size: 0.78rem;
            color: #555;
        }
        .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.15);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 14px auto 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) {
            .container { padding: 24px 16px; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn-vn.iof.vn/TV/Xemtv_cat_Toi.png" alt="XemTV.vn" class="logo-img" onerror="this.style.display='none'">
        <h1>Máy chủ đang bảo trì</h1>
        <p class="desc">Hệ thống đang được nâng cấp. Tín hiệu sẽ được khôi phục trong thời gian ngắn.</p>

        <div class="status-box">
            <p><strong>Trạng thái:</strong> <span id="status-text" class="status-offline">Proxy offline</span></p>
            <p><strong>Tự động kiểm tra:</strong> Mỗi 5 giây</p>
            <p><strong>Khi khôi phục:</strong> Tự động quay lại xem TV</p>
        </div>

        <button class="btn-check" id="btn-check" onclick="manualCheck()">Kiểm tra ngay</button>
        <div class="spinner" id="spinner"></div>
        <div class="auto-info">Tự kiểm tra sau <span id="cd">5</span>s</div>
    </div>

    <script>
        var checkUrl = 'https://server.xemtv.vn/fpt/proxy/xemtv/channels.php';
        var redirectUrl = '/tv.html';
        var checking = false;
        var countdownVal = 5;
        var cdEl = document.getElementById('cd');
        var spinEl = document.getElementById('spinner');
        var statusEl = document.getElementById('status-text');
        var btnEl = document.getElementById('btn-check');

        function doCheck() {
            if (checking) return;
            checking = true;
            spinEl.style.display = 'block';
            btnEl.disabled = true;
            statusEl.textContent = 'Đang kiểm tra...';
            statusEl.className = 'status-checking';
            fetch(checkUrl, { signal: AbortSignal.timeout(3000) })
                .then(function(r) {
                    if (r.ok) {
                        statusEl.textContent = 'Online — đang chuyển...';
                        statusEl.style.color = '#4caf50';
                        window.location.replace(redirectUrl);
                    } else {
                        resetCheck();
                    }
                })
                .catch(function() {
                    resetCheck();
                });
        }

        function resetCheck() {
            checking = false;
            spinEl.style.display = 'none';
            btnEl.disabled = false;
            statusEl.textContent = 'Proxy offline';
            statusEl.className = 'status-offline';
        }

        function manualCheck() {
            countdownVal = 5;
            doCheck();
        }

        doCheck();

        setInterval(function() {
            countdownVal--;
            if (countdownVal <= 0) {
                countdownVal = 5;
                doCheck();
            }
            cdEl.textContent = countdownVal;
        }, 1000);

        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 13) { manualCheck(); e.preventDefault(); }
        });
    </script>
</body>
</html>
