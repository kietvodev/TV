<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MyTV - Xem Truyền Hình</title>
<link rel="icon" href="https://cdn-vn.iof.vn/TV/favicon.png">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/shaka-player.compiled.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e; --border: #2a2a2a;
  --text: #e8e8e8; --text2: #999; --accent: #ff6a3d; --accent2: #ff4500;
  --green: #00c853; --blue: #448aff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

/* ===== HEADER ===== */
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 20px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 22px; font-weight: 700; color: var(--accent); white-space: nowrap; }
.logo span { color: var(--text); font-weight: 400; font-size: 14px; margin-left: 6px; }
.search-box {
  flex: 1; max-width: 400px; position: relative;
}
.search-box input {
  width: 100%; padding: 8px 12px 8px 36px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px; outline: none;
}
.search-box input:focus { border-color: var(--accent); }
.search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 13px; }
.header-info { margin-left: auto; font-size: 12px; color: var(--text2); white-space: nowrap; }

/* ===== LAYOUT ===== */
.main { display: flex; height: calc(100vh - 52px); }

/* ===== CHANNEL LIST ===== */
.sidebar {
  width: 320px; min-width: 280px; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header {
  padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text2);
}
.sidebar-header .count { background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.group-tabs {
  display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 12px; border-bottom: 1px solid var(--border);
}
.group-tab {
  padding: 4px 10px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 14px; font-size: 11px; color: var(--text2); cursor: pointer; white-space: nowrap;
  transition: all .15s;
}
.group-tab:hover { border-color: var(--accent); color: var(--text); }
.group-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.channel-list {
  flex: 1; overflow-y: auto; padding: 4px 0;
}
.channel-list::-webkit-scrollbar { width: 4px; }
.channel-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.ch-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer;
  transition: background .12s; border-left: 3px solid transparent;
}
.ch-item:hover { background: var(--surface2); }
.ch-item.active { background: rgba(255,106,61,.1); border-left-color: var(--accent); }
.ch-item img {
  width: 36px; height: 36px; border-radius: 6px; object-fit: contain; background: #222; flex-shrink: 0;
}
.ch-item .ch-name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ch-item .ch-group { font-size: 10px; color: var(--text2); }
.ch-item .ch-badge {
  font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 600;
}
.badge-drm { background: #7c4dff22; color: #b388ff; border: 1px solid #7c4dff44; }
.badge-hls { background: #00c85322; color: #69f0ae; border: 1px solid #00c85344; }

/* ===== PLAYER ===== */
.player-area { flex: 1; display: flex; flex-direction: column; background: #000; }
.player-wrap {
  flex: 1; position: relative; display: flex; align-items: center; justify-content: center;
  background: #000; min-height: 0;
}
.player-wrap video { width: 100%; height: 100%; object-fit: contain; background: #000; }
.player-overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; background: rgba(0,0,0,.7);
  z-index: 10; transition: opacity .3s;
}
.player-overlay.hidden { opacity: 0; pointer-events: none; }
.player-overlay img { width: 64px; height: 64px; border-radius: 12px; margin-bottom: 12px; object-fit: contain; }
.player-overlay .spinner { display: flex; gap: 4px; margin-bottom: 8px; }
.player-overlay .spinner i { width: 4px; height: 18px; background: var(--accent); border-radius: 2px; animation: bar .8s ease-in-out infinite; }
.player-overlay .spinner i:nth-child(2) { animation-delay: .1s; }
.player-overlay .spinner i:nth-child(3) { animation-delay: .2s; }
.player-overlay .spinner i:nth-child(4) { animation-delay: .3s; }
.player-overlay .spinner i:nth-child(5) { animation-delay: .4s; }
@keyframes bar { 0%,100%{transform:scaleY(.4)} 50%{transform:scaleY(1)} }
.player-overlay .msg { font-size: 13px; color: var(--text2); }
.player-info {
  padding: 12px 20px; background: var(--surface); border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.player-info img { width: 32px; height: 32px; border-radius: 6px; object-fit: contain; }
.player-info .pi-name { font-size: 15px; font-weight: 600; }
.player-info .pi-detail { font-size: 12px; color: var(--text2); }
.player-info .pi-status { margin-left: auto; font-size: 12px; padding: 4px 10px; border-radius: 6px; }
.status-live { background: #c6282822; color: #ff5252; }
.status-loading { background: #ff6a3d22; color: var(--accent); }
.status-error { background: #ff000022; color: #ff5252; }

/* ===== TOAST ===== */
.toast {
  position: fixed; top: 16px; right: 16px; padding: 10px 18px; border-radius: 8px;
  font-size: 13px; z-index: 999; transition: opacity .3s, transform .3s;
  transform: translateY(-10px); opacity: 0; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.toast-ok { background: #1b5e20; color: #a5d6a7; }
.toast-err { background: #b71c1c; color: #ef9a9a; }
.toast-warn { background: #e65100; color: #ffcc80; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .main { flex-direction: column-reverse; }
  .sidebar { width: 100%; height: 45vh; min-width: unset; border-right: none; border-top: 1px solid var(--border); }
  .player-area { height: 55vh; }
  .group-tabs { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
}
</style>
</head>
<body>

<header>
  <div class="logo">MyTV <span>Test Player</span></div>
  <div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" id="search" placeholder="Tìm kênh..." autocomplete="off">
  </div>
  <div class="header-info" id="header-info">Đang tải...</div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <i class="fas fa-tv"></i> Kênh MyTV
      <span class="count" id="ch-count">0</span>
    </div>
    <div class="group-tabs" id="group-tabs"></div>
    <div class="channel-list" id="channel-list"></div>
  </div>
  <div class="player-area">
    <div class="player-wrap">
      <video id="video" playsinline></video>
      <div class="player-overlay" id="overlay">
        <img id="ov-logo" src="" alt="">
        <div class="spinner"><i></i><i></i><i></i><i></i><i></i></div>
        <div class="msg" id="ov-msg">Chọn kênh để xem</div>
      </div>
    </div>
    <div class="player-info" id="player-info" style="display:none">
      <img id="pi-logo" src="" alt="">
      <div>
        <div class="pi-name" id="pi-name"></div>
        <div class="pi-detail" id="pi-detail"></div>
      </div>
      <div class="pi-status status-loading" id="pi-status">Đang tải</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
'use strict';

// ===== CONFIG =====
const API_BASE = /^https?:\/\/(127\.0\.0\.1|localhost)(:\d+)?/.test(location.origin)
  ? location.origin : 'https://cdn-vn.xemtv.vn';
const SEG_BASE = API_BASE;

// ===== STATE =====
let allChannels = [];
let filteredChannels = [];
let currentChannel = null;
let currentGroup = 'all';
let hlsInstance = null;
let shakaPlayer = null;
let loadAbort = null;
let heartbeatTimer = null;

// ===== DOM =====
const $ = id => document.getElementById(id);
const video = $('video');
const overlay = $('overlay');
const ovLogo = $('ov-logo');
const ovMsg = $('ov-msg');
const channelListEl = $('channel-list');
const groupTabsEl = $('group-tabs');
const searchInput = $('search');
const chCountEl = $('ch-count');
const headerInfo = $('header-info');
const toastEl = $('toast');

// ===== UTILS =====
const segProxy = (url) => {
  if (!url || url.startsWith(API_BASE)) return url;
  if (!url.includes('mytvnet') && !url.includes('mytv')) return url;
  return SEG_BASE + '/seg?t=mytv&u=' + encodeURIComponent(url);
};

let toastTimer = null;
const showToast = (msg, type, ms) => {
  clearTimeout(toastTimer);
  toastEl.className = 'toast toast-' + (type || 'ok') + ' show';
  toastEl.textContent = msg;
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms || 3000);
};

const showOverlay = (msg, logo) => {
  if (logo) ovLogo.src = logo;
  ovLogo.style.display = logo ? 'block' : 'none';
  ovMsg.textContent = msg || '';
  overlay.classList.remove('hidden');
};
const hideOverlay = () => overlay.classList.add('hidden');

const setStatus = (text, type) => {
  const el = $('pi-status');
  el.textContent = text;
  el.className = 'pi-status status-' + (type || 'loading');
};

// ===== DESTROY =====
const destroyPlayers = () => {
  if (loadAbort) { loadAbort.abort(); loadAbort = null; }
  if (hlsInstance) { try { hlsInstance.destroy(); } catch(e) {} hlsInstance = null; }
  if (shakaPlayer) { try { shakaPlayer.destroy(); } catch(e) {} shakaPlayer = null; }
  video.removeAttribute('src');
  video.load();
};

// ===== PLAY HLS (MyTV non-DRM) =====
const playHLS = (channel) => {
  destroyPlayers();
  const abort = new AbortController();
  loadAbort = abort;

  const rawId = channel.channelId.replace(/^mytv_/, '');
  const streamUrl = API_BASE + '/live/mytv_' + rawId + '.m3u8';
  showOverlay('Đang kết nối...', channel.logo);
  setStatus('Đang tải', 'loading');

  const tryLoad = async (attempt) => {
    if (abort.signal.aborted) return;
    try {
      const r = await fetch(streamUrl, { signal: abort.signal });
      if (r.status === 503) {
        if (attempt < 30) setTimeout(() => tryLoad(attempt + 1), 2000);
        else { showOverlay('Không lấy được stream'); setStatus('Lỗi', 'error'); }
        return;
      }
    } catch(e) {
      if (abort.signal.aborted) return;
      if (attempt < 30) { setTimeout(() => tryLoad(attempt + 1), 2000); return; }
      showOverlay('Lỗi kết nối'); setStatus('Lỗi', 'error'); return;
    }
    if (abort.signal.aborted) return;

    if (!Hls.isSupported()) {
      video.src = streamUrl;
      video.play().catch(() => {});
      hideOverlay(); setStatus('● Trực tiếp', 'live');
      return;
    }

    hlsInstance = new Hls({
      lowLatencyMode: false, liveSyncDurationCount: 3, liveMaxLatencyDurationCount: 6,
      liveDurationInfinity: true, maxBufferLength: 30, maxMaxBufferLength: 60,
      fragLoadingMaxRetry: 6, manifestLoadingMaxRetry: 10
    });
    hlsInstance.loadSource(streamUrl);
    hlsInstance.attachMedia(video);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      video.muted = true;
      video.play().then(() => { video.muted = false; }).catch(() => {});
      hideOverlay(); setStatus('● Trực tiếp', 'live');
    });
    hlsInstance.on(Hls.Events.ERROR, (e, d) => {
      if (abort.signal.aborted) return;
      if (d.fatal) {
        setStatus('Lỗi stream', 'error');
        showToast('Lỗi stream, đang thử lại...', 'warn');
        if (d.type === Hls.ErrorTypes.NETWORK_ERROR) hlsInstance.startLoad();
        else setTimeout(() => { if (!abort.signal.aborted) playHLS(channel); }, 4000);
      }
    });
  };
  tryLoad(0);
};

// ===== PLAY DRM (Shaka + Widevine) =====
const playDRM = (channel) => {
  destroyPlayers();
  const abort = new AbortController();
  loadAbort = abort;

  const rawId = channel.channelId.replace(/^mytv_/, '');
  const apiUrl = API_BASE + '/api/mytv-stream/' + rawId;
  showOverlay('Đang kết nối DRM...', channel.logo);
  setStatus('Đang tải DRM', 'loading');

  (async () => {
    const t0 = Date.now();
    let delay = 3000;
    while (!abort.signal.aborted) {
      try {
        const r = await fetch(apiUrl, { signal: abort.signal });
        const data = await r.json();
        if (abort.signal.aborted) return;
        if (!data.ok || !data.mpdProxy) {
          if (Date.now() - t0 > 120000) break;
          showOverlay('Đang chờ stream DRM...', channel.logo);
          await new Promise(res => setTimeout(res, delay));
          delay = Math.min(delay * 2, 15000);
          continue;
        }

        // Shaka init
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
          showOverlay('Trình duyệt không hỗ trợ DRM');
          setStatus('Không hỗ trợ', 'error'); return;
        }

        shakaPlayer = new shaka.Player(video);
        shakaPlayer.addEventListener('error', (e) => {
          if (abort.signal.aborted) return;
          const code = e.detail?.code;
          if (code === 1001) {
            try { const sr = shakaPlayer.seekRange(); if (sr?.end > 0) video.currentTime = sr.end - 5; } catch(ex) {}
            return;
          }
          console.warn('[DRM Error]', e.detail);
          showToast('Lỗi DRM, đang thử lại...', 'warn');
          showOverlay('Đang kết nối lại...', channel.logo);
          setTimeout(() => { if (!abort.signal.aborted) playDRM(channel); }, 4000);
        });

        // Request filter: proxy segments
        shakaPlayer.getNetworkingEngine().registerRequestFilter((type, req) => {
          req.uris[0] = segProxy(req.uris[0]);
          delete req.headers['Range'];
        });

        // Response filter: unwrap DRMtoday JSON license
        shakaPlayer.getNetworkingEngine().registerResponseFilter((type, resp) => {
          if (type !== shaka.net.NetworkingEngine.RequestType.LICENSE) return;
          try {
            const txt = new TextDecoder().decode(resp.data);
            if (txt.startsWith('{')) {
              const j = JSON.parse(txt);
              if (j.license) {
                const bin = atob(j.license);
                const arr = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
                resp.data = arr.buffer;
              }
            }
          } catch(e) {}
        });

        const mpdUrl = API_BASE + data.mpdProxy;
        const licUrl = data.licenseProxy ? API_BASE + data.licenseProxy : null;

        if (licUrl) {
          shakaPlayer.configure({
            drm: {
              servers: { 'com.widevine.alpha': licUrl, 'com.microsoft.playready': licUrl },
              advanced: {
                'com.widevine.alpha': { audioRobustness: '', videoRobustness: '' },
                'com.microsoft.playready': { audioRobustness: '', videoRobustness: '' }
              }
            }
          });
        }
        shakaPlayer.configure({
          streaming: { bufferingGoal: 6, rebufferingGoal: 2, stallEnabled: true, stallThreshold: 1, stallSkipSeconds: 5 },
          manifest: { dash: { ignoreSuggestedPresentationDelay: false } }
        });

        await shakaPlayer.load(mpdUrl);
        if (abort.signal.aborted) return;

        // Seek live edge
        try { const sr = shakaPlayer.seekRange(); if (sr?.end > 0) video.currentTime = sr.end; } catch(e) {}

        video.muted = true;
        video.addEventListener('playing', function onPlay() {
          video.removeEventListener('playing', onPlay);
          hideOverlay();
          setStatus('● Trực tiếp (DRM)', 'live');
          video.muted = false;
        });
        video.addEventListener('waiting', () => {
          if (!abort.signal.aborted) showOverlay('Đang buffer...', channel.logo);
        });
        video.addEventListener('playing', () => { if (!abort.signal.aborted) hideOverlay(); });

        const tryPlay = (n) => {
          if (abort.signal.aborted || !shakaPlayer) return;
          video.play().catch(() => { if (n < 5) setTimeout(() => tryPlay(n + 1), 800); });
        };
        tryPlay(0);
        return;

      } catch(e) {
        if (abort.signal.aborted) return;
        if (Date.now() - t0 > 120000) break;
        await new Promise(res => setTimeout(res, delay));
        delay = Math.min(delay * 2, 15000);
      }
    }
    if (!abort.signal.aborted) {
      showOverlay('Không thể kết nối DRM');
      setStatus('Timeout', 'error');
    }
  })();
};

// ===== SELECT CHANNEL =====
const selectChannel = (channel) => {
  if (currentChannel?.channelId === channel.channelId) return;
  currentChannel = channel;

  // Heartbeat
  clearInterval(heartbeatTimer);
  fetch(API_BASE + '/heartbeat/' + channel.channelId).catch(() => {});
  heartbeatTimer = setInterval(() => fetch(API_BASE + '/heartbeat/' + channel.channelId).catch(() => {}), 8000);

  // Update UI
  $('player-info').style.display = 'flex';
  $('pi-logo').src = channel.logo || '';
  $('pi-name').textContent = channel.TV || channel.name;
  $('pi-detail').textContent = channel.group + ' | ' + channel.channelId + (channel.mytvDrm ? ' | DRM' : ' | HLS');

  // Highlight
  channelListEl.querySelectorAll('.ch-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === channel.channelId);
  });

  // Play
  if (channel.mytvDrm) playDRM(channel);
  else playHLS(channel);

  // URL
  const slug = (channel.TV || channel.name).toLowerCase().replace(/[^a-z0-9]+/g, '-');
  history.replaceState(null, '', '?ch=' + slug);
};

// ===== RENDER =====
const renderChannels = (channels) => {
  channelListEl.innerHTML = '';
  channels.forEach(ch => {
    const div = document.createElement('div');
    div.className = 'ch-item' + (currentChannel?.channelId === ch.channelId ? ' active' : '');
    div.dataset.id = ch.channelId;
    div.innerHTML = `
      <img src="${ch.logo || ''}" alt="" loading="lazy" onerror="this.style.display='none'">
      <div>
        <div class="ch-name">${ch.TV || ch.name}</div>
        <div class="ch-group">${ch.group || ''}</div>
      </div>
      <span class="ch-badge ${ch.mytvDrm ? 'badge-drm' : 'badge-hls'}">${ch.mytvDrm ? 'DRM' : 'HLS'}</span>`;
    div.addEventListener('click', () => selectChannel(ch));
    channelListEl.appendChild(div);
  });
};

const renderGroups = (channels) => {
  const groups = new Map();
  groups.set('all', channels.length);
  channels.forEach(ch => {
    const g = ch.group || 'Khác';
    groups.set(g, (groups.get(g) || 0) + 1);
  });

  groupTabsEl.innerHTML = '';
  for (const [name, count] of groups) {
    const btn = document.createElement('div');
    btn.className = 'group-tab' + (currentGroup === name ? ' active' : '');
    btn.textContent = name === 'all' ? `Tất cả (${count})` : `${name} (${count})`;
    btn.addEventListener('click', () => {
      currentGroup = name;
      filterAndRender();
      groupTabsEl.querySelectorAll('.group-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
    });
    groupTabsEl.appendChild(btn);
  }
};

const filterAndRender = () => {
  const q = searchInput.value.trim().toLowerCase();
  filteredChannels = allChannels.filter(ch => {
    if (currentGroup !== 'all' && ch.group !== currentGroup) return false;
    if (q && !(ch.TV || ch.name).toLowerCase().includes(q) && !ch.channelId.includes(q)) return false;
    return true;
  });
  chCountEl.textContent = filteredChannels.length;
  renderChannels(filteredChannels);
};

// ===== LOAD CHANNELS =====
const loadChannels = async () => {
  try {
    const r = await fetch(API_BASE + '/api/channels/list');
    const data = await r.json();
    const channels = (data.channels || data).filter(ch => ch.source === 'mytv');
    allChannels = channels;

    const drmCount = channels.filter(c => c.mytvDrm).length;
    const hlsCount = channels.length - drmCount;
    headerInfo.textContent = `${channels.length} kênh (${hlsCount} HLS, ${drmCount} DRM)`;

    renderGroups(channels);
    filterAndRender();

    // Auto-select from URL or first channel
    const urlParam = new URLSearchParams(location.search).get('ch');
    let matched = null;
    if (urlParam) {
      matched = channels.find(ch => {
        const slug = (ch.TV || ch.name).toLowerCase().replace(/[^a-z0-9]+/g, '-');
        return slug === urlParam || ch.channelId === urlParam;
      });
    }
    if (matched) selectChannel(matched);
  } catch(e) {
    headerInfo.textContent = 'Lỗi kết nối';
    showToast('Không thể tải danh sách kênh', 'err');
  }
};

// ===== EVENTS =====
searchInput.addEventListener('input', filterAndRender);

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (document.activeElement === searchInput) return;
  const idx = filteredChannels.findIndex(c => c.channelId === currentChannel?.channelId);
  if (e.key === 'ArrowUp' && idx > 0) { e.preventDefault(); selectChannel(filteredChannels[idx - 1]); }
  if (e.key === 'ArrowDown' && idx < filteredChannels.length - 1) { e.preventDefault(); selectChannel(filteredChannels[idx + 1]); }
  if (e.key === 'f' || e.key === 'F') {
    e.preventDefault();
    if (document.fullscreenElement) document.exitFullscreen();
    else video.requestFullscreen?.();
  }
  if (e.key === 'm' || e.key === 'M') { e.preventDefault(); video.muted = !video.muted; }
});

// ===== INIT =====
loadChannels();

})();
</script>
</body>
</html>
