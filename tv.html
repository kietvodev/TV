<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>XemTV.vn - Xem truyền hình trực tuyến miễn phí</title>
    <meta name="description" content="Xem TV trực tuyến miễn phí tại Xemtv.vn. Truyền hình trực tuyến với chất lượng cao, đa dạng kênh.">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="https://xemtv.vn/Xemtvico.ico" type="image/x-icon">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <!-- Smart TV: Samsung Tizen / LG WebOS / Android TV -->
    <meta name="tizen:app-id" content="xemtv.tv">
    <meta name="webosbrowser:screenTimeout" content="0">
    <meta property="og:site_name" content="XemTv.vn">
    <meta property="og:image" content="https://xemtv.vn/XemTv.jpg" />
    <meta property="og:url" content="https://xemtv.vn/tv.html">
    <meta property="og:type" content="website">

    <!-- Apple icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://xemtv.vn/Image_APPLE/XEMTV_180X180.png">
    <!-- Web icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://xemtv.vn/Image_WEB/XEMTV_32X32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://xemtv.vn/Image_WEB/XEMTV_192X192.png">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/shaka-player.compiled.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn-vn.iof.vn/fpt/web/tv.css?v=149">
    <script src="https://cdn-vn.iof.vn/fpt/web/tv.js?v=154"></script>

    <style>
        html { visibility: hidden; }
        #catchup-player {
            width: 100% !important;
            display: none;
            border-radius: 16px;
            background: #000;
            aspect-ratio: 16/9;
            object-fit: contain;
        }
        body.catchup-mode #catchup-player { display: block; }
    </style>
</head>

<body>

    <!-- Player full-screen -->
    <section class="player-section">
        <div class="container">
            <div class="player-container" id="player-container">
                <video id="video-player" autoplay playsinline muted poster="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"></video>
            </div>
        </div>
    </section>

    <!-- Info bar – hiện ở dưới khi chuyển kênh / nhấn phím, tự ẩn sau 5s -->
    <div id="tv-info-bar" class="tv-info-bar">
        <div class="tib-left">
            <div class="tib-logo-wrap">
                <img id="tib-logo" src="" alt="">
            </div>
            <div class="tib-text">
                <div id="tib-chname" class="tib-chname">--</div>
                <div id="tib-program" class="tib-program">Đang phát trực tiếp</div>
            </div>
        </div>
        <div class="tib-right">
            <div id="tib-chnum" class="tib-chnum">--</div>
            <div id="tib-time" class="tib-time">--:--</div>
        </div>
    </div>

    <!-- Nút toggle remote (hiện khi di chuột / chạm) -->
    <button id="remote-toggle-btn" class="remote-toggle-btn" title="Điều khiển từ xa">
        <i class="fas fa-gamepad"></i>
    </button>

    <!-- Remote điều khiển on-screen -->
    <div id="tv-remote" class="tv-remote remote-hidden">

        <div class="rmt-header">
            <img src="https://cdn-vn.iof.vn/TV/Xemtv_cat_Toi.png" alt="XemTV" class="rmt-logo" onerror="this.style.display='none'">
            <button class="rmt-close" onclick="document.getElementById('tv-remote').classList.add('remote-hidden');window._remoteVisible=false;" title="Đóng">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- CH+ / Quay lại / CH- -->
        <div class="rmt-row rmt-ch-row">
            <button class="rmt-btn rmt-ch" data-action="ch_up">
                <i class="fas fa-chevron-up"></i><span>CH+</span>
            </button>
            <button class="rmt-btn rmt-back" data-action="back">
                <i class="fas fa-arrow-left"></i><span>Quay lại</span>
            </button>
            <button class="rmt-btn rmt-ch" data-action="ch_down">
                <i class="fas fa-chevron-down"></i><span>CH-</span>
            </button>
        </div>

        <!-- D-pad -->
        <div class="rmt-dpad">
            <div class="rmt-dpad-ring">
                <button class="rmt-dpad-btn rmt-dpad-up"    data-action="up">   <i class="fas fa-chevron-up"></i></button>
                <button class="rmt-dpad-btn rmt-dpad-left"  data-action="left"> <i class="fas fa-chevron-left"></i></button>
                <button class="rmt-dpad-ok"                 data-action="ok">OK</button>
                <button class="rmt-dpad-btn rmt-dpad-right" data-action="right"><i class="fas fa-chevron-right"></i></button>
                <button class="rmt-dpad-btn rmt-dpad-down"  data-action="down"> <i class="fas fa-chevron-down"></i></button>
            </div>
        </div>

        <!-- Menu / Info -->
        <div class="rmt-row">
            <button class="rmt-btn" data-action="menu">
                <i class="fas fa-th"></i><span>Danh sách</span>
            </button>
            <button class="rmt-btn rmt-info-btn" data-action="info">
                <i class="fas fa-info-circle"></i><span>Thông tin</span>
            </button>
        </div>

        <!-- Số 1-9, phụ, 0, xóa -->
        <div class="rmt-numpad">
            <button class="rmt-num" data-num="1">1</button>
            <button class="rmt-num" data-num="2">2</button>
            <button class="rmt-num" data-num="3">3</button>
            <button class="rmt-num" data-num="4">4</button>
            <button class="rmt-num" data-num="5">5</button>
            <button class="rmt-num" data-num="6">6</button>
            <button class="rmt-num" data-num="7">7</button>
            <button class="rmt-num" data-num="8">8</button>
            <button class="rmt-num" data-num="9">9</button>
            <button class="rmt-num rmt-num-side" data-action="guide"><i class="fas fa-list"></i></button>
            <button class="rmt-num" data-num="0">0</button>
            <button class="rmt-num rmt-num-side" data-action="delete"><i class="fas fa-delete-left"></i></button>
        </div>

        <!-- Pairing info (QR + mã kết nối) -->
        <div id="rmt-pairing-info" class="rmt-pairing-info">
            <span style="color:rgba(255,255,255,.4);font-size:0.7rem">Đang kết nối...</span>
        </div>

    </div><!-- /#tv-remote -->

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QHCHRWQJFC"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-QHCHRWQJFC');
</script>

<!-- Kiểm tra server trước khi hiển thị -->
<script>
    (function() {
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:') {
            document.documentElement.style.visibility = 'visible';
            return;
        }
        fetch('https://cdn-vn.iof.vn/api/channels/list')
            .then(r => {
                if (!r.ok) window.location.replace('/404-tv.html');
                else document.documentElement.style.visibility = 'visible';
            })
            .catch(() => window.location.replace('/404-tv.html'));
    })();
</script>

<!-- Service Worker (PWA / TWA) -->
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
</script>

</body>
</html>
